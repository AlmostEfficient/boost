<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#08080F">
  <meta name="description" content="Harm reduction supplement guide for MDMA, LSD, psilocybin and ketamine.">
  <title>Harm Reduction</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    /* ── RESET ──────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
      height: 100%;
    }

    body {
      background: #08080F;
      color: #F0F0FA;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none;
      color: inherit;
      touch-action: manipulation;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    #app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .screen {
      min-height: 100vh;
      padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
    }

    /* ── HOME ───────────────────────────────────────────── */
    .home-header {
      padding: max(56px, calc(40px + env(safe-area-inset-top, 0px))) 24px 28px;
    }

    .home-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .home-subtitle {
      font-size: 17px;
      color: rgba(240, 240, 250, 0.5);
      line-height: 1.5;
    }

    .substance-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px;
    }

    .substance-card {
      background: #111119;
      border: 1.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 22px;
      padding: 22px 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      min-height: 170px;
      position: relative;
      overflow: hidden;
      transition: transform 0.12s ease;
      text-align: left;
      width: 100%;
    }

    .substance-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 22px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .substance-card[data-id="mdma"]::after  { background: radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.22) 0%, transparent 65%); }
    .substance-card[data-id="lsd"]::after   { background: radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.22) 0%, transparent 65%); }
    .substance-card[data-id="shrooms"]::after { background: radial-gradient(ellipse at 20% 20%, rgba(34,197,94,0.22) 0%, transparent 65%); }
    .substance-card[data-id="ketamine"]::after { background: radial-gradient(ellipse at 20% 20%, rgba(6,182,212,0.22) 0%, transparent 65%); }

    .substance-card:active {
      transform: scale(0.96);
    }

    .substance-card:active::after {
      opacity: 1;
    }

    .substance-emoji {
      font-size: 38px;
      line-height: 1;
      display: block;
      position: relative;
      z-index: 1;
    }

    .substance-card-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1.1;
      position: relative;
      z-index: 1;
    }

    .substance-card[data-id="mdma"]     .substance-card-name { color: #C084FC; }
    .substance-card[data-id="lsd"]      .substance-card-name { color: #60A5FA; }
    .substance-card[data-id="shrooms"]  .substance-card-name { color: #4ADE80; }
    .substance-card[data-id="ketamine"] .substance-card-name { color: #22D3EE; }

    .substance-card-aka {
      font-size: 12.5px;
      color: rgba(240, 240, 250, 0.4);
      line-height: 1.4;
      position: relative;
      z-index: 1;
    }

    .home-footer {
      padding: 28px 24px max(32px, env(safe-area-inset-bottom, 32px));
      text-align: center;
    }

    .home-footer p {
      font-size: 12.5px;
      color: rgba(240, 240, 250, 0.25);
      line-height: 1.6;
    }

    /* ── SUBSTANCE VIEW ─────────────────────────────────── */
    .substance-header {
      padding: max(16px, env(safe-area-inset-top, 16px)) 16px 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(240, 240, 250, 0.6);
      padding: 12px 4px;
      min-height: 52px;
      transition: color 0.1s;
      touch-action: manipulation;
    }

    .back-btn:active {
      color: rgba(240, 240, 250, 0.3);
    }

    .back-btn svg {
      flex-shrink: 0;
    }

    .substance-title-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 6px 4px 18px;
    }

    .substance-view-emoji {
      font-size: 44px;
      line-height: 1;
    }

    .substance-view-name {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .substance-view-aka {
      font-size: 13.5px;
      color: rgba(240, 240, 250, 0.4);
      margin-top: 3px;
    }

    /* ── PHASE TABS ─────────────────────────────────────── */
    .phase-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 16px;
      margin-bottom: 6px;
    }

    .phase-tab {
      background: #111119;
      border: 1.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 13px;
      padding: 12px 6px 10px;
      font-size: 15px;
      font-weight: 600;
      color: rgba(240, 240, 250, 0.4);
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s ease;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      touch-action: manipulation;
    }

    .phase-tab:active {
      transform: scale(0.95);
    }

    .phase-tab.active {
      color: #F0F0FA;
      border-color: var(--accent);
      background: var(--accent-bg);
    }

    .phase-tab-count {
      font-size: 11px;
      font-weight: 500;
      opacity: 0.65;
      font-variant-numeric: tabular-nums;
    }

    /* ── TIMING BANNER ──────────────────────────────────── */
    .timing-banner {
      margin: 10px 16px 6px;
      padding: 11px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timing-text {
      font-size: 14px;
      font-weight: 500;
      color: rgba(240, 240, 250, 0.65);
    }

    /* ── ALERT BOXES ────────────────────────────────────── */
    .alert-box {
      margin: 8px 16px 4px;
      padding: 14px 16px;
      border-radius: 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .alert-box.warning {
      background: rgba(239, 68, 68, 0.09);
      border: 1.5px solid rgba(239, 68, 68, 0.28);
    }

    .alert-box.info {
      background: rgba(6, 182, 212, 0.07);
      border: 1.5px solid rgba(6, 182, 212, 0.22);
    }

    .alert-icon {
      font-size: 20px;
      flex-shrink: 0;
      line-height: 1.2;
    }

    .alert-content {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(240, 240, 250, 0.75);
    }

    .alert-box.warning .alert-title {
      color: #FCA5A5;
      font-weight: 700;
      font-size: 15px;
      display: block;
      margin-bottom: 3px;
    }

    .alert-box.info .alert-title {
      color: #67E8F9;
      font-weight: 700;
      font-size: 15px;
      display: block;
      margin-bottom: 3px;
    }

    /* ── SUPPLEMENT LIST ────────────────────────────────── */
    .supplement-list {
      padding: 4px 16px 0;
    }

    .section-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: rgba(240, 240, 250, 0.3);
      padding: 14px 4px 8px;
    }

    .section-heading:first-child {
      padding-top: 6px;
    }

    /* ── SUPPLEMENT CARD ────────────────────────────────── */
    .supplement-card {
      background: #111119;
      border: 1.5px solid rgba(255, 255, 255, 0.07);
      border-radius: 15px;
      margin-bottom: 9px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.18s ease, background 0.18s ease;
      overflow: hidden;
      touch-action: manipulation;
      width: 100%;
      text-align: left;
    }

    .supplement-card:active {
      background: #181820;
    }

    .supplement-card.is-checked {
      border-color: var(--accent);
      background: var(--accent-bg);
    }

    .supplement-inner {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 16px 15px;
    }

    /* ── CHECKBOX ───────────────────────────────────────── */
    .checkbox-wrap {
      flex-shrink: 0;
      margin-top: 1px;
    }

    .checkbox-visual {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s ease;
    }

    .supplement-card.is-checked .checkbox-visual {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-svg {
      width: 15px;
      height: 15px;
      opacity: 0;
      transform: scale(0.4);
      transition: all 0.18s ease;
    }

    .supplement-card.is-checked .check-svg {
      opacity: 1;
      transform: scale(1);
    }

    /* ── SUPPLEMENT INFO ────────────────────────────────── */
    .supplement-info {
      flex: 1;
      min-width: 0;
    }

    .supplement-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 5px;
    }

    .supplement-name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.1px;
      line-height: 1.2;
      transition: opacity 0.18s ease;
    }

    .supplement-card.is-checked .supplement-name {
      opacity: 0.38;
      text-decoration: line-through;
      text-decoration-color: rgba(240, 240, 250, 0.25);
    }

    .supplement-dose {
      font-size: 13px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      color: rgba(240, 240, 250, 0.45);
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      letter-spacing: 0.2px;
    }

    .badge-essential {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #FCD34D;
      background: rgba(251, 191, 36, 0.11);
      border: 1px solid rgba(251, 191, 36, 0.22);
      padding: 2px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .supplement-reason {
      font-size: 14px;
      color: rgba(240, 240, 250, 0.58);
      line-height: 1.45;
      transition: opacity 0.18s ease;
    }

    .supplement-card.is-checked .supplement-reason {
      opacity: 0.35;
    }

    .supplement-note {
      font-size: 13px;
      color: rgba(240, 240, 250, 0.38);
      line-height: 1.45;
      margin-top: 5px;
      font-style: italic;
      transition: opacity 0.18s ease;
    }

    .supplement-card.is-checked .supplement-note {
      opacity: 0.3;
    }

    /* ── EMPTY STATE ────────────────────────────────────── */
    .empty-phase {
      margin: 12px 16px 0;
      padding: 28px 20px;
      background: rgba(255, 255, 255, 0.025);
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      text-align: center;
    }

    .empty-phase-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 12px;
    }

    .empty-phase-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-phase-body {
      font-size: 14.5px;
      color: rgba(240, 240, 250, 0.45);
      line-height: 1.55;
    }

    /* ── BOTTOM BAR ─────────────────────────────────────── */
    .bottom-bar {
      padding: 24px 16px max(32px, env(safe-area-inset-bottom, 32px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .progress-note {
      font-size: 13px;
      color: rgba(240, 240, 250, 0.3);
      text-align: center;
    }

    .reset-btn {
      font-size: 14px;
      color: rgba(240, 240, 250, 0.28);
      padding: 11px 20px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      background: transparent;
      transition: color 0.15s, border-color 0.15s;
      touch-action: manipulation;
    }

    .reset-btn:active {
      color: rgba(240, 240, 250, 0.6);
      border-color: rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
